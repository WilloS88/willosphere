version: "3.8"

services:
  mysql:
    image: mysql:8.0.23
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    ports:
      - 3307:3306
    container_name: willosphere_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: willosphere_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
